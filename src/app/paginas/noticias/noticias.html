<div class="container mt-4">
  <h2 class="text-center mb-4">Noticias</h2>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let noticia of noticias">
      <div class="card h-100 shadow-sm position-relative">
        <img
          src="https://via.placeholder.com/400x200"
          class="card-img-top"
          alt="Imagen noticia"
        >

        <div class="card-body d-flex flex-column">
          <h5 class="card-title">
            {{ noticia.titulo }}
          </h5>

          <p class="card-text">
            {{ noticia.descripcion }}
          </p>

          <a [routerLink]="['/noticia', noticia.id]" class="stretched-link">
            <span class="visually-hidden">Ver detalle</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
