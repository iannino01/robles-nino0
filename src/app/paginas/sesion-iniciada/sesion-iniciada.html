<section class="principal-page">
  <div class="container py-5">
    <div class="principal-card mx-auto text-center">
      <img
        *ngIf="perfil?.picture"
        [src]="perfil?.picture"
        class="principal-avatar"
        alt="Perfil"
      />

      <h2 class="mb-3">Hola {{ perfil?.given_name || 'usuario' }}</h2>

      <button class="btn btn-primary principal-button" (click)="irAFamilia()">
        Ir a familia
      </button>
    </div>
  </div>
</section>
