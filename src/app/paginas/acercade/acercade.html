<div class="container mt-5">
  <h2 class="text-center mb-4 fw-bold">
    Acerca de
  </h2>

  <div class="row">
    @for (item of info; track item.id) {
      <div class="col-md-6 mb-4">
        <div class="card shadow h-100 border-0">
          <div class="card-body">
            <h5 class="fw-bold">
              {{ item.titulo }}
            </h5>

            <p>
              {{ item.descripcion }}
            </p>
          </div>
        </div>
      </div>
    }
  </div>
</div>
