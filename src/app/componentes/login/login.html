<section class="login-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="login-wrapper shadow-lg">
          <div class="row g-0">
            <div class="col-lg-6">
              <article class="login-hero h-100">
                <span class="login-tag">Portal familiar</span>
                <h1>Bienvenido al archivo de la familia Robles Nino</h1>
                <p class="login-lead">
                  Accede a noticias, registros y contenido privado del sitio desde una interfaz
                  clara y moderna.
                </p>
              </article>
            </div>

            <div class="col-lg-6">
              <article class="login-panel">
                <header class="mb-4">
                  <p class="text-uppercase small login-overline">Iniciar sesion</p>
                  <h2>Ingresa a tu cuenta</h2>
                  <p class="text-secondary mb-0">
                    Completa tus datos para continuar.
                  </p>
                </header>
                <div class="google-login-row">
                  <p class="google-login-label mb-0">Sign in with</p>
                  <button
                    type="button"
                    class="btn google-login-button"
                    (click)="login()"
                  >
                    <img
                      src="/google1.png"
                      height="20"
                      width="20"
                      alt="Google Logo"
                    />
                  </button>
                </div>

                <div class="divider d-flex align-items-center my-4">
                  <p class="text-center fw-bold mx-3 mb-0">Or</p>
                </div>

                <form class="login-form" (ngSubmit)="iniciarSesion()">
                  <div>
                    <label class="form-label" for="correo">Correo electronico</label>
                    <input
                      id="correo"
                      class="form-control"
                      type="email"
                      name="correo"
                      [(ngModel)]="correo"
                      placeholder="familia@linaje.mx"
                      required>
                  </div>

                  <div>
                    <label class="form-label" for="clave">Contrasena</label>
                    <div class="password-field">
                      <input
                        id="clave"
                        class="form-control"
                        [type]="mostrarClave ? 'text' : 'password'"
                        name="clave"
                        [(ngModel)]="clave"
                        placeholder="Ingresa tu contrasena"
                        required>
                      <button
                        type="button"
                        class="password-toggle"
                        (click)="alternarClave()">
                        {{ mostrarClave ? 'Ocultar' : 'Mostrar' }}
                      </button>
                    </div>
                  </div>

                  <div class="login-options">
                    <label class="remember-me">
                      <input type="checkbox" name="recordar" [(ngModel)]="recordar" />
                      <span>Recordar sesion</span>
                    </label>
                    <a href="/">Olvidaste tu contrasena?</a>
                  </div>

                  <button class="btn login-submit" type="submit" [disabled]="enviando()">
                    {{ enviando() ? 'Validando acceso...' : 'Entrar' }}
                  </button>
                </form>
              </article>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
